<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Surprise for You</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* Start Button Screen */
        #start-screen { text-align: center; z-index: 100; }
        .start-btn { 
            background: #ff4d6d; border: none; padding: 15px 40px; color: white; 
            font-size: 1.5rem; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 0 20px #ff4d6d; animation: pulse 1.5s infinite;
        }

        /* Scanner Section */
        #scanner-container { display: none; text-align: center; width: 100%; }
        #video { width: 280px; height: 280px; border-radius: 50%; object-fit: cover; border: 5px solid #ff4d6d; box-shadow: 0 0 20px #ff4d6d; }
        .scan-box { position: relative; display: inline-block; margin-top: 20px; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: #ff4d6d; box-shadow: 0 0 15px #ff4d6d; animation: scan 2s infinite ease-in-out; z-index: 10; }
        
        /* Surprise Section */
        #surprise { display: none; text-align: center; animation: fadeIn 2s ease-in; padding: 20px; }
        .photo-frame { width: 250px; border: 10px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: rotate(-3deg); margin-bottom: 25px; border-radius: 5px; }
        
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1 { color: #ff4d6d; text-shadow: 0 0 10px rgba(255,77,109,0.5); }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="margin-bottom: 20px;">Hey! I have a surprise for you...</h2>
        <button class="start-btn" onclick="startSurprise()">Open Surprise</button>
    </div>

    <audio id="bdayMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="scanner-container">
        <h2 id="status">Scanning the Most Beautiful Person...</h2>
        <div class="scan-box">
            <div class="scan-line"></div>
            <video id="video" autoplay playsinline></video>
        </div>
        <p id="progress" style="margin-top: 20px; font-weight: bold; color: #ff4d6d;">0% Analyzed</p>
    </div>

    <div id="surprise">
        <img src="mylove.jpg" alt="Birthday Queen" class="photo-frame">
        <h1>Happy Birthday, My Love! ❤️</h1>
        <p style="font-size: 1.2rem;">
            Scanner ne confirm kiya hai... <br>
            Ki tum is duniya ki sabse pyari ladki ho! ✨
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const music = document.getElementById('bdayMusic');
        const startScreen = document.getElementById('start-screen');
        const scannerContainer = document.getElementById('scanner-container');
        const video = document.getElementById('video');

        function startSurprise() {
            // Play Music Immediately (User interaction allowed this)
            music.play();
            
            // Hide Start Screen, Show Scanner
            startScreen.style.display = 'none';
            scannerContainer.style.display = 'block';

            // Start Camera
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(function(stream) { video.srcObject = stream; })
                .catch(function(err) { alert("Please allow camera access!"); });
            }

            // Fake Progress
            let count = 0;
            let interval = setInterval(() => {
                count += 1;
                document.getElementById('progress').innerText = count + "% Analyzed";
                if(count === 100) {
                    clearInterval(interval);
                    revealSurprise();
                }
            }, 60);
        }

        function revealSurprise() {
            if (video.srcObject) {
                let tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
            }
            scannerContainer.style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            
            // Confetti
            var end = Date.now() + (7 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }
    </script>
</body>
</html>
